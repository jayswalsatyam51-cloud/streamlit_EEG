# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: eeg-cswl
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: DO_REGION
        sync: false
      - key: DO_ACCESS_KEY
        sync: false
      - key: DO_ACCESS_SECRET
        sync: false
      - key: DO_BUCKET_NAME
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: "*"
